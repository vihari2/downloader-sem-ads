<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Downloader Pro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div> <h1>Baixar Vídeos do Instagram</h1>
       <p>Coloque o link do video aqui: </p></div>
       <div><form class="form search-form">
        <div class="form__block">
          <input id="input" class="form__input" type="text" placeholder="Cole o link aqui..." />
          <div class="form__block-btn">
            <button class="btn-paste" type="button">📋 Colar</button>
            <button class="btn-clear" type="reset">❌ Limpar</button>
          </div></div>
        </div>
        
        <button type="submit" class="form__submit">Baixar</button>
      </form>
    </div>
    <script src="script.js"></script>
  </body>
</html>
